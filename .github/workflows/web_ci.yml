name: Web and Node.js CI

on:
  push:
    branches: [main]
    paths:
      - "renderers/**"
      - "tools/**"
      - "samples/client/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/web_ci.yml"
      - ".github/actions/setup-node/**"
  pull_request:
    paths:
      - "renderers/**"
      - "tools/**"
      - "samples/client/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/web_ci.yml"
      - ".github/actions/setup-node/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Healthy runs finish in ~20 min. Cap the job so a hung test fails fast
    # instead of running to the default 6h timeout (see issue #1637).
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - name: Build all JS/TS workspaces
        run: yarn build:all
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run all JS/TS tests
        run: yarn test:all
      - name: Run publish script integration test
        run: node --test renderers/scripts/publish_npm.test.mjs
