name: Python CI

on:
  push:
    branches: [main]
    paths:
      - "agent_sdks/python/**"
      - "specification/**/json/**"
      - "agent_sdks/conformance/**"
      - "samples/agent/adk/**"
      - ".agents/skills/**"
      - "scripts/run_skills_tests.py"
      - ".github/workflows/python_ci.yml"
      - ".github/actions/setup-python/**"
  pull_request:
    paths:
      - "agent_sdks/python/**"
      - "specification/**/json/**"
      - "agent_sdks/conformance/**"
      - "samples/agent/adk/**"
      - ".agents/skills/**"
      - "scripts/run_skills_tests.py"
      - ".github/workflows/python_ci.yml"
      - ".github/actions/setup-python/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-python
      - name: Install Dependencies
        run: uv sync --all-packages
      - name: Check Formatting
        run: |
          uv run pyink --check .
      - name: Type Check
        run: |
          uv run --all-packages mypy .
      - name: Run Unit Tests
        run: uv run pytest
      - name: Verify Load Real
        run: uv run python agent_sdks/python/a2ui_agent/tests/integration/verify_load_real.py
      - name: Build All Packages
        run: uv build --all
      - name: Run Skills Unit Tests
        run: uv run python3 scripts/run_skills_tests.py
