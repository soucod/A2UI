# Builds and publishes the MkDocs documentation site.
#
# On a pull request that touches docs sources, it runs a build-only check to
# catch errors without publishing. On a push to `main`, it builds and deploys
# the site to GitHub Pages via `mkdocs gh-deploy`. Before building, it copies
# the specification schemas into the docs tree (flattening versioned JSON to the
# version root for clean URLs) and converts GitHub-style admonitions to the
# MkDocs format. Runs only on the upstream `a2ui-project/a2ui` repository.
name: Docs

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docs.yml"
      - "requirements-docs.txt"
      - "pyproject.toml"
      - "lychee.toml"
      - "mkdocs.yml"
      - "docs/**"
  pull_request:
    branches:
      - main

jobs:
  changes:
    if: github.repository == 'a2ui-project/a2ui'
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Check for docs changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            docs:
              - ".github/workflows/docs.yml"
              - "requirements-docs.txt"
              - "pyproject.toml"
              - "mkdocs.yml"
              - "lychee.toml"
              - "docs/**"
              - "**.md"

  build_and_deploy:
    needs: changes
    if: github.repository == 'a2ui-project/a2ui' && (github.event_name == 'push' || needs.changes.outputs.docs == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git Credentials
        run: |
          git config --global user.name github-actions[bot]
          git config --global user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Setup Python
        uses: ./.github/actions/setup-python
        with:
          python-version: "3.13"

      - name: Install documentation dependencies
        run: |
          uv venv
          uv pip install -r requirements-docs.txt

      - name: Validate documentation conversion script
        run: uv run pytest docs/scripts/test_convert_docs.py

      - name: Copy schemas to documentation
        run: |
          mkdir -p docs/public/specification/
          cp -R specification/* docs/public/specification/
          # Flatten JSON files to version roots to support clean URLs without redirects
          for version in v0_8 v0_9 v0_9_1 v1_0; do
            if [ -d "docs/public/specification/$version/json" ]; then
              cp docs/public/specification/$version/json/*.json docs/public/specification/$version/
            fi
          done

      - name: Convert Admonitions in Documentation
        run: uv run python docs/scripts/convert_docs.py

      - name: Build Documentation (PR Check)
        if: github.event_name == 'pull_request'
        run: uv run mkdocs build

      # Pre-submit only: verify that links in every Markdown file resolve,
      # catching broken internal paths and dead external URLs. Placeholder URLs
      # and tuning live in lychee.toml at the repository root.
      - name: Restore lychee link-check cache
        if: github.event_name == 'pull_request'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Verify Markdown links (PR Check)
        if: github.event_name == 'pull_request'
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: >-
            --config lychee.toml
            --cache
            --max-cache-age 1d
            --no-progress
            "**/*.md"
          fail: true
        env:
          # Authenticated GitHub API requests avoid rate limits on github.com links.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy development version from main branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          uv run mkdocs gh-deploy
